name: Drift and GC Checks

on:
  schedule:
    - cron: "15 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: drift-gc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  drift-gc:
    name: drift-gc
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra cli --group dev

      - name: Run lint
        run: uv run ruff check

      - name: Run type checks
        run: uv run mypy stock_manager

      - name: Run programmer tests
        run: |
          mkdir -p reports
          uv run pytest tests/unit tests/fixtures \
            --cov=stock_manager \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            --junitxml=reports/drift-programmer.xml

      - name: Run package build
        run: uv build

      - name: Run mock promotion gate
        run: |
          mkdir -p .sisyphus/evidence
          uv run python scripts/mock_qa_gate.py --emit .sisyphus/evidence/mock-promotion-gate.json

      - name: Upload drift artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-gc-reports
          path: |
            coverage.xml
            reports/drift-programmer.xml
            .sisyphus/evidence/mock-promotion-gate.json
