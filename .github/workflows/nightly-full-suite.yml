name: Nightly Full Suite

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-full-suite-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-suite:
    name: full-suite (py3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra cli --group dev

      - name: Run full test suite
        run: |
          mkdir -p reports
          uv run pytest --junitxml=reports/nightly-full-suite.xml

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-suite-reports
          path: |
            reports/nightly-full-suite.xml
            htmlcov
