name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  programmer-tests:
    name: programmer-tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra cli --group dev

      - name: Run lint (ruff)
        run: uv run ruff check

      - name: Enforce KIS endpoint policy
        run: uv run python scripts/validate_kis_endpoint_policy.py

      - name: Run type check (mypy)
        run: uv run mypy stock_manager

      - name: Enforce architecture boundary (import-linter)
        run: uv run lint-imports --config pyproject.toml

      - name: Run programmer tests (coverage >= 85)
        run: |
          mkdir -p reports
          uv run pytest tests/unit tests/fixtures \
            --cov=stock_manager \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            --junitxml=reports/programmer-py${{ matrix.python-version }}.xml

      - name: Run package build
        run: uv build

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: programmer-test-reports-py${{ matrix.python-version }}
          path: |
            coverage.xml
            reports/programmer-py${{ matrix.python-version }}.xml

      - name: Publish legacy status context
        if: always() && matrix.python-version == '3.13'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          STATE="success"
          DESCRIPTION="programmer-tests passed"
          if [ "${JOB_STATUS}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="programmer-tests failed"
          fi

          curl -fsS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/statuses/${GH_SHA}" \
            -d "{\"state\":\"${STATE}\",\"context\":\"CI / programmer-tests\",\"description\":\"${DESCRIPTION}\",\"target_url\":\"${GH_RUN_URL}\"}"
